<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Chat</h1>
    
    <div id="login-container">
        <div id="login-box">
            <h2>Bienvenido</h2>
            <p>Ingresa tu nombre para comenzar a chatear</p>
            <input type="text" id="loginUsernameInput" placeholder="Tu nombre...">
            <button id="joinButton">Entrar al Chat</button>
        </div>
    </div>

    <div id="chat-container" class="hidden">
        <div id="chat-wrapper">
            <aside id="user-list">
                <h2>Usuarios Conectados</h2>
                <ul id="users"></ul>
            </aside>
            
            <main id="chat-main">
                <div id="chat-header">
                    <div id="user-identity" class="hidden">
                        Conectado como: <strong id="current-username"></strong>
                    </div>
                </div>
                <div id="messages"></div>
                
                <div id="input-area">
                    <div id="message-input-wrapper">
                        <input type="text" id="messageInput" placeholder="Escribe tu mensaje...">
                        <button id="sendButton">Enviar</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
