<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Chat</h1>
    
    <div id="login-container">
        <div id="login-box">
            <h2>Bienvenido</h2>
            <p>Ingresa tu nombre y selecciona una sala</p>
            <input type="text" id="loginUsernameInput" placeholder="Tu nombre...">
            <select id="loginRoomSelect">
                <option value="General">General</option>
                <option value="Desarrollo">Desarrollo</option>
                <option value="Soporte">Soporte</option>
                <option value="Random">Random</option>
            </select>
            <button id="joinButton">Entrar al Chat</button>
        </div>
    </div>

    <div id="chat-container" class="hidden">
        <div id="chat-wrapper">
            <aside id="sidebar">
                <section id="room-list">
                    <h2>Salas</h2>
                    <ul id="rooms">
                        <li data-room="General" class="active">General</li>
                        <li data-room="Desarrollo">Desarrollo</li>
                        <li data-room="Soporte">Soporte</li>
                        <li data-room="Random">Random</li>
                    </ul>
                </section>
                <section id="user-list">
                    <h2>Usuarios en Sala</h2>
                    <p class="sidebar-hint">Haz clic en un usuario para chat privado P2P</p>
                    <ul id="users"></ul>
                </section>
                <section id="p2p-list-section" class="hidden">
                    <h2>Chats P2P Activos</h2>
                    <ul id="p2p-active-list"></ul>
                </section>
            </aside>
            
            <main id="chat-main">
                <div id="chat-header">
                    <div id="user-identity" class="hidden">
                        Conectado como: <strong id="current-username"></strong>
                    </div>
                </div>
                <div id="messages"></div>
                
                <div id="input-area">
                    <div id="typing-indicator" class="hidden"></div>
                    <div id="message-input-wrapper">
                        <input type="text" id="messageInput" placeholder="Escribe tu mensaje...">
                        <button id="sendButton">Enviar</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para Chat Privado P2P -->
    <div id="p2p-modal" class="hidden">
        <div id="p2p-window">
            <div id="p2p-header">
                <h3>Chat Privado P2P: <span id="p2p-target-name"></span></h3>
                <div class="p2p-controls">
                    <span id="p2p-status" class="status-connecting">Conectando...</span>
                    <button id="closeP2P">×</button>
                </div>
            </div>
            <div id="p2p-messages"></div>
            <div id="p2p-input-area">
                <input type="text" id="p2pMessageInput" placeholder="Escribe un mensaje privado P2P...">
                <button id="p2pSendButton">Enviar</button>
            </div>
        </div>
    </div>

    <div id="notifications-container"></div>
    <script src="js/chat.js"></script>
</body>
</html>
